<nav class="fixed top-0 right-0 z-50 p-6">
  <ul class="flex gap-6 text-sm text-white/80">
    {% for item in nav_links %}
      <li>
        <a href="{{ item.url }}" class="hover:underline transition" target="_blank" rel="noreferrer">
          {{ item.label }}
        </a>
      </li>
    {% empty %}
      <li><span class="text-white/60">No navigation links yet</span></li>
    {% endfor %}
  </ul>
</nav>
